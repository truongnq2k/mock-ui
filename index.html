<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kolia AI - Đăng ký thông tin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --primary: #00bfa5;
      --primary-container: #00a48e;
      --primary-dark: #006b5c;
      --on-primary: #ffffff;
      --secondary: #2196f3;
      --tertiary: #e3f2fd;
      --neutral: #f8fafc;
      --on-surface: #191c1e;
      --on-surface-variant: #404752;
      --surface-container-lowest: #ffffff;
      --error: #ba1a1a;
      --error-container: #ffdad6;
      --outline: #707883;
      --outline-variant: #bfc7d4;
      --font-display: 'Manrope', sans-serif;
      --font-label: 'Plus Jakarta Sans', sans-serif;
      --radius-sm: 0.5rem;
      --radius-md: 1.5rem;
      --radius-lg: 2rem;
      --radius-xl: 3rem;
      --radius-full: 9999px;
      --shadow-glass: 0 8px 32px rgba(0, 191, 165, 0.08);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 20%, #1a3a3a, #0f1a1d 60%, #0a0e10);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: var(--font-display);
      padding: 16px;
    }

    .screen {
      width: 100%;
      max-width: 400px;
      min-height: 100vh;
      background: linear-gradient(165deg, var(--tertiary) 0%, var(--neutral) 100%);
      padding: 32px 24px;
      position: relative;
      border-radius: 40px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 30px 80px rgba(0, 0, 0, 0.5),
        0 0 60px rgba(0, 191, 165, 0.06);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header h1 {
      font-family: var(--font-display);
      font-size: 44px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 13px;
      font-weight: 500;
      color: var(--on-surface-variant);
      opacity: 0.7;
      font-family: var(--font-label);
      letter-spacing: 0.02em;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: var(--radius-xl);
      padding: 28px 24px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-bottom-color: rgba(255, 255, 255, 0.05);
      border-right-color: rgba(255, 255, 255, 0.05);
      box-shadow: var(--shadow-glass);
    }

    .form-title {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      color: var(--on-surface);
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .form-desc {
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      color: var(--on-surface-variant);
      opacity: 0.6;
      margin-bottom: 28px;
      font-family: var(--font-label);
      letter-spacing: 0.01em;
    }

    /* ── INPUT ── */
    .field-group {
      margin-bottom: 20px;
    }

    .field-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--on-surface);
      margin-bottom: 8px;
      font-family: var(--font-label);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .field-group input {
      width: 100%;
      height: 52px;
      border: 1.5px solid rgba(191, 199, 212, 0.4);
      background: rgba(248, 250, 252, 0.5);
      padding: 0 18px;
      font-size: 16px;
      font-weight: 600;
      color: var(--on-surface);
      font-family: var(--font-display);
      outline: none;
      border-radius: var(--radius-full);
      transition: all 0.25s ease;
    }

    .field-group input::placeholder {
      color: var(--outline);
      font-weight: 500;
      opacity: 0.6;
    }

    .field-group input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 0 4px rgba(0, 191, 165, 0.1);
    }

    .field-group input.error {
      border-color: var(--error);
      box-shadow: 0 0 0 4px rgba(186, 26, 26, 0.1);
    }

    .error-text {
      font-size: 11px;
      font-weight: 500;
      color: var(--error);
      margin-top: 4px;
      font-family: var(--font-label);
      display: none;
    }

    /* ── BUTTON ── */
    .btn-submit {
      width: 100%;
      height: 52px;
      background: var(--primary);
      border: none;
      color: var(--on-primary);
      font-size: 15px;
      font-weight: 700;
      border-radius: var(--radius-full);
      font-family: var(--font-display);
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 6px 24px rgba(0, 191, 165, 0.3);
      letter-spacing: 0.02em;
      margin-top: 4px;
    }

    .btn-submit:active {
      transform: scale(0.97);
      box-shadow: 0 3px 12px rgba(0, 191, 165, 0.35);
    }

    /* ── PRIVACY ── */
    .privacy {
      max-width: 260px;
      margin: 18px auto 0;
      text-align: center;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.5;
      color: var(--outline);
      font-family: var(--font-label);
      letter-spacing: 0.01em;
    }

    /* ── OTP OVERLAY ── */
    .otp-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      padding: 24px 20px;
    }

    .otp-overlay.show {
      display: flex;
    }

    .otp-modal {
      width: 100%;
      max-width: 340px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: var(--radius-xl);
      padding: 28px 24px 24px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-bottom-color: rgba(255, 255, 255, 0.1);
      border-right-color: rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.12);
      animation: otpIn 0.3s ease;
    }

    @keyframes otpIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .otp-modal h2 {
      font-size: 18px;
      font-weight: 800;
      color: var(--on-surface);
      letter-spacing: -0.3px;
      margin-bottom: 2px;
    }

    .otp-modal .otp-desc {
      font-size: 13px;
      font-weight: 500;
      color: var(--on-surface-variant);
      opacity: 0.6;
      margin-bottom: 24px;
      font-family: var(--font-label);
    }

    .otp-modal .otp-desc b {
      color: var(--on-surface);
      opacity: 1;
    }

    .otp-boxes {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .otp-boxes input {
      width: 44px;
      height: 52px;
      border: 1.5px solid var(--outline-variant);
      border-radius: var(--radius-md);
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      font-family: var(--font-display);
      color: var(--on-surface);
      outline: none;
      transition: all 0.2s ease;
      background: rgba(248, 250, 252, 0.5);
    }

    .otp-boxes input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0, 191, 165, 0.1);
      background: #fff;
    }

    .otp-boxes input.filled {
      border-color: var(--primary);
      background: rgba(0, 191, 165, 0.06);
    }

    .otp-resend {
      font-size: 12px;
      font-weight: 500;
      color: var(--on-surface-variant);
      font-family: var(--font-label);
      margin-bottom: 20px;
    }

    .otp-resend a {
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
    }

    .otp-resend a.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    .otp-error {
      font-size: 12px;
      font-weight: 500;
      color: var(--error);
      font-family: var(--font-label);
      display: none;
      margin-bottom: 12px;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 440px) {
      body {
        padding: 0;
        background: transparent;
      }

      .screen {
        max-width: 100%;
        border-radius: 0;
        min-height: 100dvh;
        box-shadow: none;
        padding: 24px 16px;
      }

      .form-card {
        padding: 24px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="screen">

    <div class="header">
      <h1>Kolia AI</h1>
      <p>Ứng dụng theo dõi sức khoẻ</p>
    </div>

    <div class="form-card">
      <h2 class="form-title">Đăng ký thông tin</h2>
      <p class="form-desc">Vui lòng cung cấp thông tin để bắt đầu</p>

      <div class="field-group">
        <label>Số điện thoại</label>
        <input type="tel" id="sodt" placeholder="0912 345 678" required />
        <div class="error-text" id="errSodt">Vui lòng nhập số điện thoại</div>
      </div>

      <button class="btn-submit" onclick="validateAndNext()">Tiếp tục</button>

      <p class="privacy">
        Thông tin của bạn được bảo mật theo chính sách quyền riêng tư
      </p>
    </div>

  </div>

  <div class="otp-overlay" id="otpOverlay" onclick="if(event.target===this) closeOtp()">
    <div class="otp-modal">
      <h2>Xác thực OTP</h2>
      <div class="otp-desc">Nhập mã 6 số gửi đến <b id="otpPhone">0912 345 678</b></div>

      <div class="otp-boxes" id="otpBoxes">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus>
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>

      <div class="otp-error" id="otpError">Mã OTP không đúng, vui lòng thử lại</div>

      <div class="otp-resend">
        Chưa nhận được mã? <a id="otpResendLink" onclick="resendOtp()">Gửi lại</a>
        <span id="otpCountdown" style="display:none;color:var(--outline);"></span>
      </div>

      <button class="btn-submit" id="otpBtn" onclick="verifyOtp()" disabled>Xác thực</button>
    </div>
  </div>

  <script>
    function validateAndNext() {
      const sodt = document.getElementById('sodt');
      const errSodt = document.getElementById('errSodt');
      let ok = true;
      if (!sodt.value.trim()) {
        sodt.classList.add('error');
        errSodt.style.display = 'block';
        ok = false;
      } else {
        sodt.classList.remove('error');
        errSodt.style.display = 'none';
      }
      if (!ok) return;
      document.getElementById('otpPhone').textContent = sodt.value.trim();
      document.getElementById('otpOverlay').classList.add('show');
      document.querySelector('#otpBoxes input').focus();
    }

    // ── OTP ──
    const otpInputs = document.querySelectorAll('#otpBoxes input');
    const otpError = document.getElementById('otpError');
    const otpBtn = document.getElementById('otpBtn');

    otpInputs.forEach((inp, i) => {
      inp.addEventListener('input', function () {
        this.value = this.value.replace(/\D/g, '').slice(0, 1);
        if (this.value) this.classList.add('filled');
        else this.classList.remove('filled');
        otpError.style.display = 'none';
        if (this.value && i < otpInputs.length - 1) {
          otpInputs[i + 1].focus();
        }
        updateOtpBtn();
      });
      inp.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && !this.value && i > 0) {
          otpInputs[i - 1].focus();
          otpInputs[i - 1].value = '';
          otpInputs[i - 1].classList.remove('filled');
          updateOtpBtn();
        }
        if (e.key === 'Enter' && otpBtn.disabled === false) verifyOtp();
      });
      inp.addEventListener('focus', function () { this.select(); });
    });

    function updateOtpBtn() {
      const filled = Array.from(otpInputs).every(inp => inp.value.length === 1);
      otpBtn.disabled = !filled;
    }

    function verifyOtp() {
      const code = Array.from(otpInputs).map(inp => inp.value).join('');
      if (code.length !== 6) return;
      otpBtn.disabled = true;
      otpBtn.textContent = 'Đang xác thực...';
      setTimeout(() => {
        if (code === '123456') {
          location.href = 'thong-tin-ca-nhan.html';
        } else {
          otpError.style.display = 'block';
          otpInputs.forEach(inp => { inp.value = ''; inp.classList.remove('filled'); });
          otpInputs[0].focus();
          otpBtn.textContent = 'Xác thực';
          otpBtn.disabled = false;
        }
      }, 1200);
    }

    function closeOtp() {
      document.getElementById('otpOverlay').classList.remove('show');
    }

    let countdown = 60;
    function resendOtp() {
      const link = document.getElementById('otpResendLink');
      const cd = document.getElementById('otpCountdown');
      link.style.display = 'none';
      cd.style.display = 'inline';
      countdown = 60;
      cd.textContent = ' (' + countdown + 's)';
      const timer = setInterval(() => {
        countdown--;
        cd.textContent = ' (' + countdown + 's)';
        if (countdown <= 0) {
          clearInterval(timer);
          link.style.display = 'inline';
          cd.style.display = 'none';
        }
      }, 1000);
      otpError.style.display = 'none';
    }
  </script>
</body>

</html>
