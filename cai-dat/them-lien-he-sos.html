<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Liên hệ cảnh báo SOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #00bfa5;
  --primary-dark: #006b5c;
  --on-primary: #ffffff;
  --tertiary: #e3f2fd;
  --neutral: #f8fafc;
  --on-surface: #191c1e;
  --on-surface-variant: #404752;
  --error: #ba1a1a;
  --error-container: #ffdad6;
  --outline: #707883;
  --outline-variant: #bfc7d4;
  --font-display: 'Manrope', sans-serif;
  --font-label: 'Plus Jakarta Sans', sans-serif;
  --radius-sm: 0.5rem;
  --radius-md: 1.5rem;
  --radius-xl: 3rem;
  --radius-full: 9999px;
  --shadow-glass: 0 8px 32px rgba(0, 191, 165, 0.08);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at 30% 20%, #1a3a3a, #0f1a1d 60%, #0a0e10);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: var(--font-display);
  padding: 16px;
}

.screen {
  width: 100%;
  max-width: 400px;
  min-height: 100vh;
  background: linear-gradient(165deg, var(--tertiary) 0%, var(--neutral) 100%);
  padding: 24px 20px;
  position: relative;
  border-radius: 40px;
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, 0.08),
    0 30px 80px rgba(0, 0, 0, 0.5),
    0 0 60px rgba(0, 191, 165, 0.06);
  overflow-y: auto;
  overflow-x: hidden;
}

.screen::-webkit-scrollbar { display: none; }

/* ── HEADER ── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-top: 4px;
}

.back {
  font-size: 24px;
  font-weight: 600;
  color: var(--primary);
  cursor: pointer;
  line-height: 1;
}

.header h1 {
  font-size: 18px;
  font-weight: 700;
  color: var(--on-surface);
  letter-spacing: -0.3px;
}

/* ── ICON ── */
.icon-wrap {
  width: 72px;
  height: 72px;
  background: rgba(255, 218, 214, 0.5);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 16px;
}

/* ── DESC ── */
.desc {
  text-align: center;
  font-size: 14px;
  font-weight: 500;
  color: var(--on-surface-variant);
  opacity: 0.65;
  line-height: 1.5;
  margin-bottom: 20px;
  font-family: var(--font-label);
  letter-spacing: 0.01em;
}

/* ── GLASS CARD ── */
.card {
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-xl);
  padding: 20px;
  margin-bottom: 14px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  border-bottom-color: rgba(255, 255, 255, 0.05);
  border-right-color: rgba(255, 255, 255, 0.05);
  box-shadow: var(--shadow-glass);
}

.section-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--on-surface);
  margin-bottom: 12px;
  letter-spacing: -0.2px;
}

/* ── CONTACT LIST ── */
.contact {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 14px;
  background: rgba(248, 250, 252, 0.5);
  border-radius: var(--radius-md);
  margin-bottom: 8px;
}

.contact-phone {
  font-size: 14px;
  font-weight: 700;
  color: var(--on-surface);
}

.contact-relation {
  font-size: 11px;
  font-weight: 500;
  color: var(--on-surface-variant);
  opacity: 0.6;
  margin-top: 1px;
  font-family: var(--font-label);
}

.contact-delete {
  font-size: 12px;
  font-weight: 600;
  color: var(--error);
  cursor: default;
  padding: 4px 8px;
  border-radius: var(--radius-full);
}

.contact-delete:active {
  background: rgba(186, 26, 26, 0.08);
}

/* ── FORM ── */
.field-group {
  margin-bottom: 14px;
}

.field-group label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  color: var(--on-surface);
  margin-bottom: 6px;
  font-family: var(--font-label);
  letter-spacing: 0.03em;
  text-transform: uppercase;
}

.field-group input {
  width: 100%;
  height: 46px;
  border: 1.5px solid rgba(191, 199, 212, 0.4);
  background: rgba(248, 250, 252, 0.5);
  padding: 0 16px;
  font-size: 14px;
  font-weight: 600;
  color: var(--on-surface);
  font-family: var(--font-display);
  outline: none;
  border-radius: var(--radius-full);
  transition: all 0.25s ease;
}

.field-group input::placeholder {
  color: var(--outline);
  font-weight: 500;
  opacity: 0.5;
}

.field-group input:focus {
  border-color: var(--primary);
  background: rgba(255, 255, 255, 0.8);
  box-shadow: 0 0 0 4px rgba(0, 191, 165, 0.1);
}

/* ── CHIPS ── */
.chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.chip {
  min-width: 72px;
  height: 32px;
  padding: 0 14px;
  background: rgba(186, 26, 26, 0.06);
  border: 1px solid rgba(186, 26, 26, 0.12);
  color: var(--error);
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--radius-full);
  font-family: var(--font-label);
  cursor: default;
  transition: all 0.2s ease;
}

.chip:active {
  background: rgba(186, 26, 26, 0.12);
}

/* ── BUTTON ── */
.btn {
  width: 100%;
  height: 50px;
  background: var(--error);
  border: none;
  color: var(--on-primary);
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--radius-full);
  font-family: var(--font-display);
  cursor: pointer;
  transition: all 0.25s ease;
  box-shadow: 0 6px 24px rgba(186, 26, 26, 0.3);
  letter-spacing: 0.02em;
}

.btn:active {
  transform: scale(0.97);
  box-shadow: 0 3px 12px rgba(186, 26, 26, 0.35);
}

/* ── TOAST ── */
.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-80px);
  background: rgba(255, 87, 87, 0.92);
  backdrop-filter: blur(16px);
  color: #fff;
  padding: 14px 24px;
  border-radius: var(--radius-full);
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-display);
  box-shadow: 0 8px 32px rgba(255, 87, 87, 0.3);
  z-index: 999;
  opacity: 0;
  transition: all 0.4s ease;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── WARNING ── */
.warning {
  background: rgba(255, 143, 0, 0.08);
  border: 1px solid rgba(255, 143, 0, 0.2);
  border-radius: var(--radius-md);
  color: var(--error);
  font-size: 11px;
  font-weight: 500;
  line-height: 1.45;
  text-align: center;
  padding: 12px 14px;
  margin-top: 16px;
  font-family: var(--font-label);
}

/* ── RESPONSIVE ── */
@media (max-width: 440px) {
  body { padding: 0; background: transparent; }
  .screen {
    max-width: 100%;
    border-radius: 0;
    min-height: 100dvh;
    box-shadow: none;
    padding: 20px 16px;
  }
}
</style>
</head>
<body>

<div class="screen">

  <div class="header">
    <div class="back" onclick="location.href='cai-dat.html'">←</div>
    <h1>Liên hệ cảnh báo SOS</h1>
  </div>

  <div class="icon-wrap">🚨</div>

  <div class="desc">
    Khi bạn bấm SOS, hệ thống sẽ gọi ngay<br>
    đến số điện thoại bên dưới
  </div>

  <div class="section-title">Danh sách liên hệ SOS</div>

  <div class="contact">
    <div>
      <div class="contact-phone">0912 xxx 456</div>
      <div class="contact-relation">Con gái - Nguyễn Thị Lan</div>
    </div>
    <div class="contact-delete">Xoá</div>
  </div>

  <div class="section-title" style="margin-top:18px;">Thêm liên hệ mới</div>

  <div class="card">
    <div class="field-group">
      <label>Số điện thoại</label>
      <input type="text" placeholder="Nhập số điện thoại (VD: 0987654321)" />
    </div>

    <div class="field-group">
      <label>Mối quan hệ</label>
      <input type="text" placeholder="VD: Vợ, Con gái, Bạn bè..." />
    </div>

    <div class="chips">
      <button class="chip">Con gái</button>
      <button class="chip">Con trai</button>
      <button class="chip">Vợ/Chồng</button>
      <button class="chip">Bạn bè</button>
    </div>
  </div>

  <button class="btn" onclick="showToast()">Thêm liên hệ SOS</button>

  <div class="warning">
    ⚠️ Tối đa 3 liên hệ SOS. Hệ thống sẽ gửi thông báo SOS liên tục đến tất cả mọi người!
  </div>

</div>

<div class="toast" id="toast">Đã đến giới hạn</div>

<script>
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); }, 1500);
  setTimeout(() => { location.href = '../thanh-toan.html'; }, 1800);
}
</script>
</body>
</html>
